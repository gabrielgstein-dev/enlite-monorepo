# Override para ambiente de desenvolvimento local.
# Usa Dockerfile.dev (ts-node-dev, hot-reload, sem prune de deps).
# Roda migrations + seeds automaticamente antes de iniciar a API.
#
# Uso via Makefile:
#   make dev

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -c "node scripts/run-migrations-docker.js &&
             node scripts/run-seeds-docker.js &&
             npx ts-node-dev --respawn --transpile-only -r tsconfig-paths/register src/index.ts"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./seeds:/app/seeds
      - ./scripts/run-migrations-docker.js:/app/scripts/run-migrations-docker.js
      - ./scripts/run-seeds-docker.js:/app/scripts/run-seeds-docker.js
      - ../.keys:/app/.keys:ro
    environment:
      NODE_ENV: development
      USE_CERBOS: "false"
      USE_KMS_ENCRYPTION: "false"
      INTERNAL_TOKEN_SECRET: dev-secret-local
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PROMPT_DOC_ID_AT: ${PROMPT_DOC_ID_AT}
      PROMPT_DOC_ID_CUIDADOR: ${PROMPT_DOC_ID_CUIDADOR}
      GOOGLE_APPLICATION_CREDENTIALS: /app/.keys/enlite-prd-e7b9624315e8.json
