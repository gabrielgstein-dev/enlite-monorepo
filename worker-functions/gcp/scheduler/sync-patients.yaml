# Cloud Scheduler job: sync ClickUp patients every 10 minutes
# Service account: configured via GCP deployment pipeline (OQ5 open)
# Requires: Cloud Run service running worker-functions exposing POST /api/internal/sync-clickup-patients

name: sync-patients-clickup
description: Import patients from ClickUp every 10 minutes
schedule: "*/10 * * * *"
timeZone: America/Argentina/Buenos_Aires
httpTarget:
  uri: ${WORKER_FUNCTIONS_SERVICE_URL}/api/internal/sync-clickup-patients
  httpMethod: POST
  headers:
    Content-Type: application/json
    X-Internal-Token: ${INTERNAL_SYNC_TOKEN}
  body: e30=  # base64 of '{}'
retryConfig:
  retryCount: 2
  minBackoffDuration: 30s
  maxDoublings: 2
