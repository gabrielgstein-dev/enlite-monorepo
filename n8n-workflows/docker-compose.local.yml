services:
  n8n-enlite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enlite_n8n_local
    ports:
      - "5678:5678"
    environment:
      environment:
      # ... (mantenha suas configurações de banco, porta e N8N_ENCRYPTION_KEY) ...
      
      # 1. Permite TODOS os módulos nativos (corrige definitivamente o erro do 'fs')
      - NODE_FUNCTION_ALLOW_BUILTIN="*"
      
      # 2. Permite TODOS os módulos externos (corrige o erro do 'puppeteer')
      - NODE_FUNCTION_ALLOW_EXTERNAL="*"
      
      # 3. Informa o caminho global do npm para o n8n achar o puppeteer que você instalou no Dockerfile
      - NODE_PATH="/usr/local/lib/node_modules"
      
      # 4. CHAVE DA VERSÃO 2.x: Desativa as restrições estritas do Task Runner
      # Necessário porque o Puppeteer modifica propriedades internas do JavaScript (como o Error.prototype)
      - N8N_RUNNERS_INSECURE_MODE="true"
      
      # Permissões do nó
      - N8N_BLOCK_ENV_ACCESS_IN_NODE="false"
      - N8N_DISABLE_FUNCTION_MODULE_ISOLATION="true"
      
    volumes:
      - n8n_data:/home/node/.n8n
      
volumes:
  n8n_data:
    driver: local
