services:
  n8n-enlite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enlite_n8n_prod
    ports:
      - "5678:5678"
    environment:
      # Configurações básicas
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      
      # URL do webhook (IMPORTANTE: Atualizar com URL do Cloud Run)
      - WEBHOOK_URL=${WEBHOOK_URL:-https://your-project-url.run.app/}
      
      # Segurança
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      
      # Configurações de performance
      - N8N_CONCURRENCY_CONTROL_ENABLED=true
      - N8N_CONCURRENCY_CONTROL_MAX=10
      
      # Banco de dados PostgreSQL (Cloud SQL)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${DB_NAME:-n8n}
      - DB_POSTGRESDB_HOST=${DB_HOST}
      - DB_POSTGRESDB_PORT=${DB_PORT:-5432}
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      
      # Logs
      - N8N_LOG_LEVEL=info
      
      # Permitir uso de módulos externos no nó de código (Puppeteer)
      - NODE_FUNCTION_ALLOW_EXTERNAL=puppeteer
      
      # Permitir acesso ao filesystem (necessário para fs/path no Code node)
      - N8N_ALLOW_UNSECURE_FS=fs,path,os
      
    volumes:
      # Persistência de dados (para Cloud Run, usar Cloud SQL ou Secret Manager)
      - n8n_data:/home/node/.n8n
      
    # Configuração de health check para Cloud Run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  n8n_data:
    driver: local
