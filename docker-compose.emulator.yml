# Firebase Auth Emulator — standalone
#
# Uso:
#   make emulator          → sobe o emulador
#   make emulator-logs     → acompanha os logs
#   make emulator-down     → para o emulador
#
# Após subir, use `make dev-firebase` em vez de `make dev`
# para que o backend use o emulador em vez de mock auth.

services:
  firebase-emulator:
    image: node:20-alpine
    container_name: enlite-firebase-emulator
    working_dir: /app
    volumes:
      - ./worker-functions/firebase.json:/app/firebase.json
      - ./worker-functions/storage.rules:/app/storage.rules
      - firebase_emulator_data:/root/.cache/firebase
    command: >
      sh -c "apk add --no-cache openjdk21-jre-headless &&
             npm install -g firebase-tools@latest --quiet &&
             firebase emulators:start --only auth,storage
             --project demo-enlite-test
             --export-on-exit /root/.cache/firebase"
    ports:
      - "9099:9099"
      - "9199:9199"
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9099 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  firebase_emulator_data:
