version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: enlite-postgres
    environment:
      POSTGRES_USER: enlite_admin
      POSTGRES_PASSWORD: enlite_password
      POSTGRES_DB: enlite_e2e
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../worker-functions/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enlite_admin -d enlite_e2e"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - enlite-network

  # Backend API (worker-functions)
  api:
    build:
      context: ../worker-functions
      dockerfile: Dockerfile
    container_name: enlite-api
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://enlite_admin:enlite_password@postgres:5432/enlite_e2e
      # Configurações para testes E2E - usar autenticação simulada
      USE_MOCK_AUTH: "true"
      INTERNAL_TOKEN_SECRET: test-secret-for-e2e-only
      # Desabilitar Cerbos para testes locais
      USE_CERBOS: "false"
      # Conectar Firebase Admin no emulador
      FIREBASE_AUTH_EMULATOR_HOST: host.docker.internal:9099
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - enlite-network

  # Frontend (enlite-frontend) - Development mode
  frontend:
    build:
      context: ../enlite-frontend
      dockerfile: Dockerfile.dev
    container_name: enlite-frontend
    environment:
      VITE_API_WORKER_FUNCTIONS_URL: http://localhost:8080
      VITE_CERBOS_URL: http://localhost:3592
      # Firebase config para testes E2E - usar emulador
      VITE_FIREBASE_API_KEY: test-api-key
      VITE_FIREBASE_AUTH_DOMAIN: localhost
      VITE_FIREBASE_PROJECT_ID: enlite-e2e-test
      VITE_FIREBASE_STORAGE_BUCKET: localhost
      VITE_FIREBASE_MESSAGING_SENDER_ID: 123456789
      VITE_FIREBASE_APP_ID: 1:123456789:web:test
      # Firebase Auth Emulator
      VITE_FIREBASE_AUTH_EMULATOR: http://localhost:9099
      # Google Maps API Key
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ../enlite-frontend/src:/app/src:ro
      - ../enlite-frontend/public:/app/public:ro
      - ../enlite-frontend/index.html:/app/index.html:ro
      - ../enlite-frontend/.env:/app/.env:ro
    depends_on:
      - api
      - firebase-emulator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - enlite-network

  # Firebase Auth Emulator
  firebase-emulator:
    image: spine3/firebase-emulator:latest
    container_name: enlite-firebase-emulator
    environment:
      - GOOGLE_CLOUD_PROJECT=enlite-e2e-test
      - GCP_PROJECT=enlite-e2e-test
      - FIREBASE_PROJECT=enlite-e2e-test
    ports:
      - "9099:9099"  # Auth emulator
      - "4000:4000"  # Emulator UI
    volumes:
      - ./firebase-emulator/firebase:/firebase
      - ./firebase-emulator/firebase/data:/firebase/data
    entrypoint: ["firebase", "emulators:start", "--only", "auth", "--project=enlite-e2e-test"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9099"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - enlite-network

volumes:
  postgres_data:

networks:
  enlite-network:
    driver: bridge
