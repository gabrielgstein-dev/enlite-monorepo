# Override para ambiente de testes E2E locais.
#
# Stacks disponíveis:
#   Mock Auth (padrão):
#     docker compose -f docker-compose.yml -f docker-compose.test.yml up -d postgres api
#
#   Firebase Emulator (prod-like):
#     docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.firebase.yml up -d postgres firebase-emulator api
#
# NÃO usar em produção.

services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"

  firebase-emulator:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./firebase.json:/app/firebase.json
      - firebase_emulator_data:/root/.cache/firebase
    command: >
      sh -c "npm install -g firebase-tools@latest --quiet &&
             firebase emulators:start --only auth
             --project demo-enlite-test
             --export-on-exit /root/.cache/firebase"
    ports:
      - "9099:9099"
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9099 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - enlite-network

  api:
    command: >
      sh -c "node scripts/run-migrations-docker.js && npm start"
    volumes:
      - ./migrations:/app/migrations
      - ./scripts/run-migrations-docker.js:/app/scripts/run-migrations-docker.js
    environment:
      NODE_ENV: test
      USE_MOCK_AUTH: "true"
      USE_CERBOS: "false"
      INTERNAL_TOKEN_SECRET: test-secret-for-e2e-only

volumes:
  firebase_emulator_data:
